name: DailyTracker
options:
  bundleIdPrefix: com.colinreed
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  DailyTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DailyTracker
    info:
      path: DailyTracker/Info.plist
      properties:
        CFBundleDisplayName: DailyTracker
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colinreed.DailyTracker
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: "YES"
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
