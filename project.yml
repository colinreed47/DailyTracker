name: DailyTracker
options:
  bundleIdPrefix: com.colinreed
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  DailyTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DailyTracker
      - path: Shared
    info:
      path: DailyTracker/Info.plist
      properties:
        CFBundleDisplayName: DailyTracker
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: DailyTracker/DailyTracker.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colinreed.DailyTracker
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: "YES"
        DEVELOPMENT_TEAM: S28599VGAR
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - target: DailyTrackerWidget

  DailyTrackerWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DailyTrackerWidget
      - path: Shared
    info:
      path: DailyTrackerWidget/Info.plist
      properties:
        CFBundleDisplayName: DailyTrackerWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: DailyTrackerWidget/DailyTrackerWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colinreed.DailyTracker.widget
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        DEVELOPMENT_TEAM: S28599VGAR
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: "YES"
