name: DailyHabits

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
options:
  bundleIdPrefix: com.colinreed
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

schemes:
  DailyHabits:
    build:
      targets:
        DailyHabits: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release

  TaskListWidget:
    build:
      targets:
        DailyHabitsWidget: all
    run:
      config: Debug
      environmentVariables:
        _XCWidgetKind: TaskListWidget

  TaskCountWidget:
    build:
      targets:
        DailyHabitsWidget: all
    run:
      config: Debug
      environmentVariables:
        _XCWidgetKind: TaskCountWidget

  LockScreenTaskWidget:
    build:
      targets:
        DailyHabitsWidget: all
    run:
      config: Debug
      environmentVariables:
        _XCWidgetKind: LockScreenTaskWidget

targets:
  DailyHabits:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DailyHabits
      - path: Shared
    info:
      path: DailyHabits/Info.plist
      properties:
        CFBundleDisplayName: DailyHabits
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: DailyHabits/DailyHabits.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.colinreed.DailyHabits
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colinreed.DailyHabits
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: "YES"
        DEVELOPMENT_TEAM: S28599VGAR
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - target: DailyHabitsWidget
      - package: Supabase
        product: Supabase

  DailyHabitsWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DailyHabitsWidget
      - path: Shared
    info:
      path: DailyHabitsWidget/Info.plist
      properties:
        CFBundleDisplayName: DailyHabitsWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: DailyHabitsWidget/DailyHabitsWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.colinreed.DailyHabits
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colinreed.DailyHabits.widget
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        DEVELOPMENT_TEAM: S28599VGAR
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: "YES"
    dependencies:
      - package: Supabase
        product: Supabase
